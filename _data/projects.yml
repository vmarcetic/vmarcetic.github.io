- name: Movieo.me
  link: movieo.me
  image: movieo.jpg
  description: |
    Movie discovery platform aggregating ratings and metadata from IMDB, Rotten Tomatoes, Metacritic, TMDB, OMDB, and other sources. Featured on Hacker News, Product Hunt, and Fast Company; used by 100,000+ people per month at its peak.

    **Problem:** People needed a fast, pleasant way to discover what to watch across a large movie catalog with fragmented data sources.

    **What I did:**
    - Built automated ingestion/update pipelines for 250,000+ movies
    - Designed caching and data delivery with Elastic and Redis for a fast user experience
    - Implemented advanced filtering and recommendation flows for movie discovery
    - Kept external API data synchronized and production-ready through background jobs

    **Result:** A high-traffic, widely shared product with strong community reception and reliable daily data refreshes.

    **Tech:** Ruby on Rails, PostgreSQL, Elastic, Redis, Thumbor

    [Fast Company coverage](http://www.fastcodesign.com/3038294/can-a-new-web-app-help-solve-the-what-movie-should-we-watch-conundrum)

