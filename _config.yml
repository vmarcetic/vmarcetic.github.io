about_content: | # this will include new lines to allow paragraphs
  I help founders and product teams stabilize, modernize, and scale Ruby on Rails applications — then connect them to useful AI workflows.

  I am a senior Ruby/Rails developer, DevOps engineer, and technical consultant from Zagreb, Croatia, with 15+ years of experience building production web applications, internal tools, data pipelines, and backend systems.

  My best fit is remote contract work where an existing Rails product needs experienced hands: upgrades, refactoring, performance work, production debugging, infrastructure cleanup, payment/CRM integrations, or practical AI/LLM automation.

  **Available for:** remote contract, freelance, part-time consulting, and CTO-for-hire engagements for founder-led SaaS products.

