<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SayTrue.ai logo v2</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f6f8fb;color:#07111f;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:40px} main{max-width:1100px;margin:auto} h1{font-size:clamp(36px,6vw,72px);letter-spacing:-.07em;line-height:.95;margin:0 0 12px} p{font-size:20px;color:#64748b;margin:0 0 32px}.card{background:white;border:1px solid #e2e8f0;border-radius:28px;padding:26px;margin:22px 0;box-shadow:0 20px 65px rgba(15,23,42,.08)} img{display:block;max-width:100%;height:auto;border-radius:16px}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px} a.btn{display:inline-flex;padding:12px 16px;border-radius:999px;background:#07111f;color:white;text-decoration:none;font-weight:760} a.light{background:#eaf1f8;color:#07111f}.label{font-weight:850;margin:0 0 14px;font-size:22px}.note{font-size:16px;color:#64748b;margin-top:10px}
  </style>
</head>
<body>
<main>
  <h1>SayTrue.ai logo v2</h1>
  <p>Normalni browser linkovi — bez ZIP-a i bez Telegram attachment problema.</p>

  <section class="card">
    <div class="label">Recommended: Signal S clean</div>
    <img src="recommended-signal-s-clean.png" alt="Recommended SayTrue.ai logo">
    <div class="btns">
      <a class="btn" href="recommended-signal-s-clean.png">Open PNG</a>
      <a class="btn light" href="recommended-signal-s-clean.svg">Open SVG</a>
    </div>
  </section>

  <section class="card">
    <div class="label">Mark only / icon</div>
    <img src="recommended-signal-s-mark.png" alt="SayTrue.ai icon mark" style="width:260px">
    <div class="btns">
      <a class="btn" href="recommended-signal-s-mark.png">Open PNG</a>
      <a class="btn light" href="recommended-signal-s-mark.svg">Open SVG</a>
    </div>
  </section>

  <section class="card">
    <div class="label">Comparison sheet</div>
    <img src="preview.png" alt="SayTrue.ai logo comparison sheet">
    <div class="btns"><a class="btn" href="preview.png">Open full preview</a></div>
  </section>

  <section class="row">
    <div class="card"><div class="label">01 Signal S</div><img src="01-signal-s.png"><div class="btns"><a class="btn" href="01-signal-s.png">PNG</a><a class="btn light" href="01-signal-s.svg">SVG</a></div></div>
    <div class="card"><div class="label">02 Source Seal</div><img src="02-source-seal.png"><div class="btns"><a class="btn" href="02-source-seal.png">PNG</a><a class="btn light" href="02-source-seal.svg">SVG</a></div></div>
    <div class="card"><div class="label">03 Citation Mark</div><img src="03-citation-mark.png"><div class="btns"><a class="btn" href="03-citation-mark.png">PNG</a><a class="btn light" href="03-citation-mark.svg">SVG</a></div></div>
  </section>
</main>
</body>
</html>
